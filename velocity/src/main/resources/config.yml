# NoPlayerStop Configuration
# Enable or disable the automatic shutdown system.
enabled: true

# Seconds to wait before shutting down after player count drops below threshold.
shutdown-delay: 300

# Seconds before shutdown to start broadcasting warnings in console.
warning-seconds: 30

# Threshold of players. If count is less than or equal to this, timer starts.
min-players: 0

# Webhook Settings
# Whether to send a JSON POST request when the server shuts down.
enable-webhooks: false

# Target URL for the webhook (e.g. Discord).
webhook-url: "http://127.0.0.1:8000"

# JSON payload. Variables: %time%, %players%, %last_player_active%, %shutdown_delay%
webhook-body: '{"content": "Server shutting down. Uptime: %time%. Last player: %last_player_active%"}'
